<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --primary: #6D28D9; /* Violet pour l'asso/organisateurs */
            --accent-red: #DC2626;
            --date-bg: #F3F4F6;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #E5E7EB; padding: 20px; display: flex; justify-content: center; }

        /* LA CARTE PRO */
        .event-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex; /* La magie opère ici : Layout Horizontal */
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* GAUCHE : LE DATE BLOCK
           On isole la date pour créer un point d'ancrage visuel fort.
           Plus besoin de lire "Dimanche...", on voit "01 DÉC".
        */
        .date-column {
            background: var(--date-bg);
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            text-align: center;
            border-right: 1px solid #E5E7EB;
        }
        .date-day { font-size: 24px; font-weight: 800; color: var(--text-main); line-height: 1; }
        .date-month { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-light); margin-top: 4px;}
        .date-time { font-size: 11px; color: var(--text-light); margin-top: 8px; font-weight: 500;}

        /* DROITE : LE CONTENU */
        .content-column {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Badges en haut */
        .meta-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        
        /* Chips (Pilules) pour les statuts au lieu de texte brut */
        .status-chip {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px;
        }
        .chip-private { background: #FEF2F2; color: var(--accent-red); display: flex; align-items: center; gap:4px; }
        .chip-asso { background: #F3E8FF; color: var(--primary); }

        /* Le Titre */
        h3 { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; line-height: 1.3; }

        /* Les Organisateurs (discret mais présent) */
        .organizers { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
        .organizers svg { width: 14px; height: 14px; color: var(--primary); }

        /* L'Action (Edit) */
        .edit-btn { position: absolute; bottom: 12px; right: 12px; opacity: 0.3; cursor: pointer; }

    </style>
</head>
<body>

    <div class="event-card">
        <div class="date-column">
            <span class="date-day">01</span>
            <span class="date-month">Déc.</span>
            <span class="date-time">15h - 11h</span>
        </div>

        <div class="content-column">
            <div class="meta-header">
                <div style="display:flex; gap:6px;">
                    <span class="status-chip chip-private">🔒 Privé</span>
                    <span class="status-chip chip-asso" style="background:#FFF1F2; color:#BE123C;">Inscription</span>
                </div>
            </div>

            <h3>Célébration de Noël œcuménique</h3>

            <div class="organizers">
                <svg fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path></svg>
                Catherine C., Jeanne B.
            </div>
        </div>

        <div class="edit-btn">✏️</div>
    </div>

</body>
</html>
